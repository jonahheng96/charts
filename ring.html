<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>听写 Ring Chart</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    width: 1280px;
    height: 720px;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 80px;
  }
  .left {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h2 {
    color: rgba(255,255,255,0.85);
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 32px;
    white-space: nowrap;
  }
  .ring-wrap {
    position: relative;
    width: 360px;
    height: 360px;
  }
  svg.ring { width: 360px; height: 360px; }
  .centre {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }
  .pct { font-size: 72px; font-weight: 700; color: #ffffff; line-height: 1; }
  .acc-label { font-size: 18px; color: rgba(255,255,255,0.5); }
  .acc-sub   { font-size: 15px; color: rgba(255,255,255,0.3); }
  .right {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .stat-box {
    background: rgba(255,255,255,0.05);
    border-radius: 16px;
    padding: 24px 48px;
    text-align: center;
    min-width: 220px;
  }
  .stat-val {
    font-size: 48px;
    font-weight: 700;
    display: block;
    margin-bottom: 8px;
  }
  .stat-lbl { font-size: 16px; color: rgba(255,255,255,0.5); }
</style>
</head>
<body>
<div class="left">
  <h2>听写 Accuracy This Period</h2>
  <div class="ring-wrap">
    <svg class="ring" viewBox="0 0 360 360" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#6a00ff"/>
          <stop offset="50%" stop-color="#b44dff"/>
          <stop offset="100%" stop-color="#ff4db8"/>
        </linearGradient>
        <filter id="ringglow">
          <feGaussianBlur stdDeviation="5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <circle cx="180" cy="180" r="140" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="36"/>
      <circle id="arc" cx="180" cy="180" r="140" fill="none" stroke="url(#ringGrad)"
        stroke-width="36" stroke-linecap="round" filter="url(#ringglow)"
        stroke-dasharray="0 879.65"
        transform="rotate(-90 180 180)"/>
      <circle id="endcap" cx="180" cy="40" r="18" fill="#ffffff" style="display:none"/>
    </svg>
    <div class="centre">
      <span class="pct" id="pct-text">0%</span>
      <span class="acc-label">Accuracy</span>
      <span class="acc-sub">This Period</span>
    </div>
  </div>
</div>
<div class="right">
  <div class="stat-box">
    <span class="stat-val" style="color:#b44dff" id="score-val">0/0</span>
    <span class="stat-lbl">Score This Period</span>
  </div>
  <div class="stat-box">
    <span class="stat-val" style="color:#ff4db8" id="pool-val">0</span>
    <span class="stat-lbl">Words in Pool</span>
  </div>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const accuracy = parseFloat(params.get('accuracy')) || 0;
  const score = params.get('score') || '0/0';
  const pool = params.get('pool') || '0';

  document.getElementById('pct-text').textContent = accuracy + '%';
  document.getElementById('score-val').textContent = score;
  document.getElementById('pool-val').textContent = pool;

  const r = 140;
  const circumference = 2 * Math.PI * r;
  const filled = (accuracy / 100) * circumference;
  const remaining = circumference - filled;
  document.getElementById('arc').setAttribute('stroke-dasharray', filled + ' ' + remaining);

  if (accuracy > 0) {
    const angleDeg = -90 + (accuracy / 100) * 360;
    const angleRad = angleDeg * Math.PI / 180;
    const cx = (180 + r * Math.cos(angleRad)).toFixed(1);
    const cy = (180 + r * Math.sin(angleRad)).toFixed(1);
    const ec = document.getElementById('endcap');
    ec.setAttribute('cx', cx);
    ec.setAttribute('cy', cy);
    ec.style.display = '';
  }
</script>
</body>
</html>
