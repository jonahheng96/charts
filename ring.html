<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>听写 Ring Chart</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    width: 420px;
    padding: 28px 24px 24px;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h2 {
    color: rgba(255,255,255,0.85);
    font-size: 13px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 24px;
  }
  .ring-wrap {
    position: relative;
    width: 280px;
    height: 280px;
    margin-bottom: 28px;
  }
  svg.ring { width: 280px; height: 280px; }
  .centre {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }
  .pct { font-size: 58px; font-weight: 700; color: #ffffff; line-height: 1; }
  .acc-label { font-size: 14px; color: rgba(255,255,255,0.5); }
  .acc-sub   { font-size: 12px; color: rgba(255,255,255,0.3); }
  .stats { display: flex; gap: 16px; width: 100%; }
  .stat-box {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    padding: 12px 16px;
    text-align: center;
  }
  .stat-val { font-size: 22px; font-weight: 700; display: block; margin-bottom: 4px; }
  .stat-lbl { font-size: 11px; color: rgba(255,255,255,0.5); }
</style>
</head>
<body>
<h2>听写 Accuracy This Period</h2>
<div class="ring-wrap">
  <svg class="ring" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#6a00ff"/>
        <stop offset="50%" stop-color="#b44dff"/>
        <stop offset="100%" stop-color="#ff4db8"/>
      </linearGradient>
      <filter id="ringglow">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <circle cx="140" cy="140" r="110" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="28"/>
    <circle id="arc" cx="140" cy="140" r="110" fill="none" stroke="url(#ringGrad)"
      stroke-width="28" stroke-linecap="round" filter="url(#ringglow)"
      stroke-dasharray="0 691.15"
      transform="rotate(-90 140 140)"/>
    <circle id="endcap" cx="140" cy="30" r="14" fill="#ffffff" style="display:none"/>
  </svg>
  <div class="centre">
    <span class="pct" id="pct-text">0%</span>
    <span class="acc-label">Accuracy</span>
    <span class="acc-sub">This Period</span>
  </div>
</div>
<div class="stats">
  <div class="stat-box">
    <span class="stat-val" style="color:#b44dff" id="score-val">0/0</span>
    <span class="stat-lbl">Score This Period</span>
  </div>
  <div class="stat-box">
    <span class="stat-val" style="color:#ff4db8" id="pool-val">0</span>
    <span class="stat-lbl">Words in Pool</span>
  </div>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const accuracy = parseFloat(params.get('accuracy')) || 0;
  const score = params.get('score') || '0/0';
  const pool = params.get('pool') || '0';

  document.getElementById('pct-text').textContent = accuracy + '%';
  document.getElementById('score-val').textContent = score;
  document.getElementById('pool-val').textContent = pool;

  const r = 110;
  const circumference = 2 * Math.PI * r;
  const filled = (accuracy / 100) * circumference;
  const remaining = circumference - filled;
  document.getElementById('arc').setAttribute('stroke-dasharray', filled + ' ' + remaining);

  if (accuracy > 0) {
    const angleDeg = -90 + (accuracy / 100) * 360;
    const angleRad = angleDeg * Math.PI / 180;
    const cx = (140 + r * Math.cos(angleRad)).toFixed(1);
    const cy = (140 + r * Math.sin(angleRad)).toFixed(1);
    const ec = document.getElementById('endcap');
    ec.setAttribute('cx', cx);
    ec.setAttribute('cy', cy);
    ec.style.display = '';
  }
</script>
</body>
</html>
