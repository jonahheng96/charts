<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>听写 Ring Chart</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fefcf9;
    width: 1280px;
    height: 720px;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 80px;
  }
  .left {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h2 {
    color: #2d1a4a;
    font-size: 26px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 32px;
    white-space: nowrap;
  }
  .ring-wrap {
    position: relative;
    width: 360px;
    height: 360px;
  }
  svg.ring { width: 360px; height: 360px; }
  .centre {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .pct { font-size: 72px; font-weight: 700; color: #1a1a1a; line-height: 1; }
  .acc-label { font-size: 20px; color: #7a6090; }
  .acc-sub   { font-size: 16px; color: #b0a0c0; }
  .right {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .stat-box {
    background: #f0ecf8;
    border-radius: 16px;
    border: 0.5px solid #e0d8ec;
    padding: 28px 52px;
    text-align: center;
    min-width: 240px;
  }
  .stat-val {
    font-size: 52px;
    font-weight: 700;
    display: block;
    margin-bottom: 8px;
  }
  .stat-lbl { font-size: 18px; color: #7a6090; }
</style>
</head>
<body>
<div class="left">
  <h2>听写 Accuracy This Period</h2>
  <div class="ring-wrap">
    <svg class="ring" viewBox="0 0 360 360" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="ringGrad" x1="0%" y1="100%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#a855f7"/>
          <stop offset="50%" stop-color="#d946aa"/>
          <stop offset="100%" stop-color="#fb6fbb"/>
        </linearGradient>
        <filter id="pillshadow" x="-60%" y="-60%" width="220%" height="220%">
          <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="rgba(80,40,120,0.35)"/>
        </filter>
      </defs>
      <circle cx="180" cy="180" r="140" fill="none" stroke="#ede4d8" stroke-width="36"/>
      <circle id="arc" cx="180" cy="180" r="140" fill="none" stroke="url(#ringGrad)"
        stroke-width="36" stroke-linecap="round"
        stroke-dasharray="0 879.65"
        transform="rotate(-90 180 180)"/>
      <circle id="endcap" cx="180" cy="40" r="18" fill="#ffffff" filter="url(#pillshadow)" style="display:none"/>
    </svg>
    <div class="centre">
      <span class="pct" id="pct-text">0%</span>
      <span class="acc-label">Accuracy</span>
      <span class="acc-sub">This Period</span>
    </div>
  </div>
</div>
<div class="right">
  <div class="stat-box">
    <span class="stat-val" style="color:#8b2be2" id="score-val">0/0</span>
    <span class="stat-lbl">Score This Period</span>
  </div>
  <div class="stat-box">
    <span class="stat-val" style="color:#e0157a" id="pool-val">0</span>
    <span class="stat-lbl">Words in Pool</span>
  </div>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const accuracy = parseFloat(params.get('accuracy')) || 0;
  const score = params.get('score') || '0/0';
  const pool = params.get('pool') || '0';

  document.getElementById('pct-text').textContent = accuracy + '%';
  document.getElementById('score-val').textContent = score;
  document.getElementById('pool-val').textContent = pool;

  const r = 140;
  const circumference = 2 * Math.PI * r;
  const filled = (accuracy / 100) * circumference;
  document.getElementById('arc').setAttribute('stroke-dasharray', filled + ' ' + (circumference - filled));

  if (accuracy > 0) {
    const angleDeg = -90 + (accuracy / 100) * 360;
    const angleRad = angleDeg * Math.PI / 180;
    const cx = (180 + r * Math.cos(angleRad)).toFixed(1);
    const cy = (180 + r * Math.sin(angleRad)).toFixed(1);
    const ec = document.getElementById('endcap');
    ec.setAttribute('cx', cx);
    ec.setAttribute('cy', cy);
    ec.style.display = '';
  }
</script>
</body>
</html>
