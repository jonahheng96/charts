<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>听写 Ring Chart</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    width: 420px;
    padding: 28px 24px 24px;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h2 {
    color: rgba(255,255,255,0.85);
    font-size: 13px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 24px;
  }
  .ring-wrap {
    position: relative;
    width: 280px;
    height: 280px;
    margin-bottom: 28px;
  }
  svg.ring { width: 280px; height: 280px; }
  .centre {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }
  .pct { font-size: 58px; font-weight: 700; color: #ffffff; line-height: 1; }
  .acc-label { font-size: 14px; color: rgba(255,255,255,0.5); }
  .acc-sub   { font-size: 12px; color: rgba(255,255,255,0.3); }
  .stats { display: flex; gap: 16px; width: 100%; }
  .stat-box {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    padding: 12px 16px;
    text-align: center;
  }
  .stat-val { font-size: 22px; font-weight: 700; display: block; margin-bottom: 4px; }
  .stat-lbl { font-size: 11px; color: rgba(255,255,255,0.5); }
</style>
</head>
<body>
<h2>听写 Accuracy This Period</h2>
<div class="ring-wrap">
  <svg class="ring" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#6a00ff"/>
        <stop offset="50%" stop-color="#b44dff"/>
        <stop offset="100%" stop-color="#ff4db8"/>
      </linearGradient>
      <filter id="ringglow">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <circle cx="140" cy="140" r="110" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="28"/>
    <circle id="arc" cx="140" cy="140" r="110" fill="none" stroke="url(#ringGrad)"
      stroke-width="28" stroke-linecap="round" filter="url(#ringglow)"
      stroke-dasharray="0 691.15"
      transform="rotate(-90 140 140)"/>
    <circle id="endcap-outer" cx="140" cy="30" r="14" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.9" style="display:none"/>
    <circle id="endcap-inner" cx="140" cy="30" r="11.5" fill="#6a00ff" style="display:none"/>
  </svg>
  <div class="centre">
    <span class="pct" id="pct-text">0%</span>
    <span class="acc-label">Accuracy</span>
    <span class="acc-sub">This Period</span>
  </div>
</div>
<div class="stats">
  <div class="stat-box">
    <span class="stat-val" style="color:#b44dff" id="score-val">0/0</span>
    <span class="stat-lbl">Score This Period</span>
  </div>
  <div class="stat-box">
    <span class="stat-val" style="color:#ff4db8" id="pool-val">0</span>
    <span class="stat-lbl">Words in Pool</span>
  </div>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const accuracy = parseFloat(params.get('accuracy')) || 0;
  const score = params.get('score') || '0/0';
  const pool = params.get('pool') || '0';

  document.getElementById('pct-text').textContent = accuracy + '%';
  document.getElementById('score-val').textContent = score;
  document.getElementById('pool-val').textContent = pool;

  const r = 110;
  const circumference = 2 * Math.PI * r;
  const filled = (accuracy / 100) * circumference;
  const remaining = circumference - filled;
  document.getElementById('arc').setAttribute('stroke-dasharray', filled + ' ' + remaining);

  if (accuracy > 0) {
    const angleDeg = -90 + (accuracy / 100) * 360;
    const angleRad = angleDeg * Math.PI / 180;
    const cx = parseFloat((140 + r * Math.cos(angleRad)).toFixed(1));
    const cy = parseFloat((140 + r * Math.sin(angleRad)).toFixed(1));

    // Sample gradient based on physical SVG position
    // Gradient: top-left(0,0) -> bottom-right(280,280)
    // t = (cx + cy) / (280 + 280) = position along gradient diagonal
    // Stops: t=0 -> #6a00ff, t=0.5 -> #b44dff, t=1.0 -> #ff4db8
    const t = (cx + cy) / 560;

    function lerp(a, b, t) { return Math.round(a + (b - a) * t); }
    function interpolate(t) {
      const c0 = [0x6a, 0x00, 0xff];
      const c1 = [0xb4, 0x4d, 0xff];
      const c2 = [0xff, 0x4d, 0xb8];
      let rv, gv, bv;
      if (t <= 0.5) {
        const s = t / 0.5;
        rv = lerp(c0[0], c1[0], s);
        gv = lerp(c0[1], c1[1], s);
        bv = lerp(c0[2], c1[2], s);
      } else {
        const s = (t - 0.5) / 0.5;
        rv = lerp(c1[0], c2[0], s);
        gv = lerp(c1[1], c2[1], s);
        bv = lerp(c1[2], c2[2], s);
      }
      return `rgb(${rv},${gv},${bv})`;
    }

    const capColor = interpolate(Math.max(0, Math.min(1, t)));

    const eo = document.getElementById('endcap-outer');
    const ei = document.getElementById('endcap-inner');
    eo.setAttribute('cx', cx); eo.setAttribute('cy', cy); eo.style.display = '';
    ei.setAttribute('cx', cx); ei.setAttribute('cy', cy);
    ei.setAttribute('fill', capColor);
    ei.style.display = '';
  }
</script>
</body>
</html>
