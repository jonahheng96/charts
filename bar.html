<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Component Bar Chart</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    width: 700px;
    padding: 28px 24px 24px;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  h2 {
    color: rgba(255,255,255,0.85);
    font-size: 13px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 22px;
  }
  .row {
    display: flex;
    align-items: center;
    margin-bottom: 18px;
    gap: 10px;
  }
  .num {
    font-size: 12px;
    font-weight: 700;
    width: 22px;
    flex-shrink: 0;
  }
  .label {
    font-size: 13px;
    color: #ffffff;
    width: 170px;
    flex-shrink: 0;
  }
  .track-wrap {
    flex: 1;
    position: relative;
    height: 28px;
  }
  .track {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.07);
    border-radius: 14px;
  }
  .bar {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }
  .pct-label {
    font-size: 11px;
    font-weight: 700;
    color: #ffffff;
    margin-right: 8px;
    white-space: nowrap;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }
  .dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #ffffff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.7), 0 0 0 3px rgba(255,255,255,0.2);
    flex-shrink: 0;
  }
  .row.inactive .num { opacity: 0.25; }
  .row.inactive .label { opacity: 0.3; }
  .row.inactive .track { background: rgba(255,255,255,0.05); }
  .divider {
    border: none;
    border-top: 0.5px solid rgba(255,255,255,0.08);
    margin: 10px 0 14px;
  }
  .disclaimer {
    text-align: center;
    color: #555;
    font-size: 11px;
    margin-bottom: 10px;
  }
  .scale {
    display: flex;
    justify-content: space-between;
    padding-left: 202px;
  }
  .scale span { color: #444; font-size: 10px; }
</style>
</head>
<body>
<h2>Tuition Performance by Component (Year to Date)</h2>
<div id="chart"></div>
<hr class="divider">
<p class="disclaimer">Components without bar charts have not been assessed in tuition this year.</p>
<div class="scale">
  <span>0</span><span>20</span><span>40</span><span>60</span><span>80</span><span>100</span>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const components = [
    { key: 'compo',  label: 'Composition',             color: ['#ff6b9d','#ff8fab'] },
    { key: 'lang',   label: 'Language Application',    color: ['#c44dff','#d580ff'] },
    { key: 'compre', label: 'Comprehension',           color: ['#00d4ff','#66e5ff'] },
    { key: 'oral',   label: 'Oral',                    color: ['#00ffb3','#66ffcc'] },
    { key: 'lc',     label: 'Listening Comprehension', color: ['#ffd93d','#ffe680'] },
  ];
  const chart = document.getElementById('chart');
  components.forEach((c, i) => {
    const val = parseFloat(params.get(c.key)) || 0;
    const active = val > 0;
    const row = document.createElement('div');
    row.className = 'row' + (active ? '' : ' inactive');
    row.innerHTML = `
      <span class="num" style="color:${c.color[0]}">${String(i+1).padStart(2,'0')}</span>
      <span class="label">${c.label}</span>
      <div class="track-wrap">
        <div class="track"></div>
        ${active ? `<div class="bar" style="width:${Math.min(val,100)}%;background:linear-gradient(90deg,${c.color[0]},${c.color[1]});box-shadow:0 0 12px ${c.color[0]}66;">
          <span class="pct-label">${val}%</span>
          <div class="dot"></div>
        </div>` : ''}
      </div>`;
    chart.appendChild(row);
  });
</script>
</body>
</html>
